name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast lint pass — placeholder check on user-visible source + i18n
  # NuxtLink guard. Both are cheap node-only scripts; running them
  # first means PRs with raw [TODO]/[IČO] markers or new internal
  # <NuxtLink to="/…"> usages (which break locale persistence under
  # i18n's prefix_except_default strategy) fail in seconds rather
  # than after a 5 min build.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/lint-placeholders.mjs
      - run: node scripts/lint-nuxtlink.mjs

  vitest:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --reporter=verbose
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-anon-key
          # @nuxtjs/supabase ≥2 expects SUPABASE_SECRET_KEY (was
          # SUPABASE_SERVICE_KEY in older versions). Server endpoints
          # using serverSupabaseServiceRole() throw without it.
          SUPABASE_SECRET_KEY: test-secret-key
          NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NUXT_PUBLIC_SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_MAPBOX_TOKEN: pk.test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          RESEND_API_KEY: re_test_dummy
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_ADMIN_SECRET: test-admin-secret
          NUXT_PRO_JWT_PRIVATE_KEY: ${{ secrets.NUXT_PRO_JWT_PRIVATE_KEY }}

  playwright:
    runs-on: ubuntu-latest
    needs: vitest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-anon-key
          # @nuxtjs/supabase ≥2 expects SUPABASE_SECRET_KEY (was
          # SUPABASE_SERVICE_KEY in older versions). Server endpoints
          # using serverSupabaseServiceRole() throw without it.
          SUPABASE_SECRET_KEY: test-secret-key
          NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NUXT_PUBLIC_SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_MAPBOX_TOKEN: pk.test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          RESEND_API_KEY: re_test_dummy
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_ADMIN_SECRET: test-admin-secret
          NUXT_PRO_JWT_PRIVATE_KEY: ${{ secrets.NUXT_PRO_JWT_PRIVATE_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Accessibility audit — runs alongside playwright (not a hard
  # dependency) so a regression in either surface is independently
  # visible. `continue-on-error: true` for now: report findings without
  # blocking PRs while we triage the initial set of issues. Flip to
  # `false` once the baseline is clean.
  pa11y:
    runs-on: ubuntu-latest
    needs: vitest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:a11y:ci
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-anon-key
          SUPABASE_SECRET_KEY: test-secret-key
          NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NUXT_PUBLIC_SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_MAPBOX_TOKEN: pk.test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          RESEND_API_KEY: re_test_dummy
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_ADMIN_SECRET: test-admin-secret
          NUXT_PRO_JWT_PRIVATE_KEY: ${{ secrets.NUXT_PRO_JWT_PRIVATE_KEY }}
