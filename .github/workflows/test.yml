name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run --reporter=verbose
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NUXT_PUBLIC_SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_MAPBOX_TOKEN: pk.test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          RESEND_API_KEY: re_test_dummy
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_ADMIN_SECRET: test-admin-secret
          NUXT_PRO_JWT_PRIVATE_KEY: ${{ secrets.NUXT_PRO_JWT_PRIVATE_KEY }}

  playwright:
    runs-on: ubuntu-latest
    needs: vitest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NUXT_PUBLIC_SUPABASE_KEY: test-anon-key
          NUXT_PUBLIC_MAPBOX_TOKEN: pk.test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test_dummy
          RESEND_API_KEY: re_test_dummy
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_ADMIN_SECRET: test-admin-secret
          NUXT_PRO_JWT_PRIVATE_KEY: ${{ secrets.NUXT_PRO_JWT_PRIVATE_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
